<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="CHECK LIST">
  <title>CHECK LIST</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>

  <style>
    body { -webkit-overflow-scrolling: touch; -webkit-tap-highlight-color: transparent; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    @import url('https://fonts.googleapis.com/css2?family=Yomogi&family=Kosugi+Maru&display=swap');
    
    .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
    .pt-safe { padding-top: env(safe-area-inset-top); }

    .sortable-ghost { opacity: 0.3; transform: scale(0.98); background-color: #F8F7F2; border: 1.5px dashed #C2BDB4; }
    .sortable-drag { cursor: grabbing !important; }

    /* 清單區域的日系點點背景 (放大尺寸) */
    .bg-dot-pattern {
      background-color: #F8F7F2;
      background-image: radial-gradient(#DEDCD0 1.5px, transparent 1.5px);
      background-size: 20px 20px;
    }
  </style>
</head>
<body class="bg-white">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ==========================================
    // 👇 Firebase 專屬設定 👇
    // ==========================================
    const firebaseConfig = {
      apiKey: "AIzaSyBfJd0gZQ2ZHZTkpMbt8TvbrhwoZPupanU",
      authDomain: "webapp-9f6b5.firebaseapp.com",
      projectId: "webapp-9f6b5",
      storageBucket: "webapp-9f6b5.firebasestorage.app",
      messagingSenderId: "315187495447",
      appId: "1:315187495447:web:48d730e6343a1e21831252"
    };

    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.firestore();
    // ==========================================

    // --- 圖示庫元件 ---
    const Icon = ({ path, className = "w-4 h-4", strokeWidth = 2.5 }) => (
      <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={strokeWidth}>
        <path strokeLinecap="round" strokeLinejoin="round" d={path} />
      </svg>
    );
    const Plus = ({className}) => <Icon className={className} path="M12 4v16m8-8H4" />;
    const Trash2 = ({className}) => <Icon className={className} path="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />;
    const Check = ({className}) => <Icon className={className} path="M5 13l4 4L19 7" strokeWidth={3.5} />;
    const RefreshCw = ({className}) => <Icon className={className} path="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />;
    const Lock = ({className}) => <Icon className={className} path="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />;
    const Unlock = ({className}) => <Icon className={className} path="M8 11V7a4 4 0 118 0m-4 8v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2z" />;
    const X = ({className}) => <Icon className={className} path="M6 18L18 6M6 6l12 12" />;
    const GripLines = ({className}) => <Icon className={className} path="M4 9h16M4 15h16" strokeWidth={2} />;
    const Folder = ({className}) => <Icon className={className} path="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z" strokeWidth={2.5} />;
    const ArrowLeft = ({className, strokeWidth = 2.5}) => (
      <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round">
        <path d="M19 12H5M12 19l-7-7 7-7" />
      </svg>
    );

    const defaultData = {
      categories: [
        { id: 'c1', name: '換尿布', items: [{ id: 'i1_1', name: '尿布 (3-5片)', checked: true }, { id: 'i1_2', name: '濕紙巾', checked: false }] },
        { id: 'c2', name: '餵食', items: [{ id: 'i2_1', name: '奶瓶', checked: false }, { id: 'i2_2', name: '奶粉', checked: false }] }
      ]
    };

    const girlFontFamily = '"華康少女文字", "華康少女文字W5", "DFGirl-W5", "DFPGirl-W5", "Yomogi", "Kosugi Maru", sans-serif';

    function App() {
      // --- 狀態管理 ---
      const [groups, setGroups] = useState([]);
      const [currentGroupId, setCurrentGroupId] = useState('');
      const [listData, setListData] = useState({ categories: [] });
      
      const [loading, setLoading] = useState(true);
      const [isEditMode, setIsEditMode] = useState(false);
      const [activeCategoryId, setActiveCategoryId] = useState('');
      
      const [isGroupModalOpen, setIsGroupModalOpen] = useState(false);
      const [newGroupInput, setNewGroupInput] = useState('');
      const [newCategoryName, setNewCategoryName] = useState('');
      const [newItemName, setNewItemName] = useState('');
      
      const [editingItemId, setEditingItemId] = useState(null);
      const [editItemValue, setEditItemValue] = useState('');
      const [editingCategoryId, setEditingCategoryId] = useState(null);
      const [editCategoryValue, setEditCategoryValue] = useState('');

      const [editingGroupId, setEditingGroupId] = useState(null);
      const [editGroupValue, setEditGroupValue] = useState('');
      const [groupToDelete, setGroupToDelete] = useState(null); 
      
      // --- 參考物件 ---
      const longPressTimer = useRef(null);
      const isLongPressTriggered = useRef(false);
      const tabsRef = useRef(null);
      const itemsRef = useRef(null);
      const sortableTabsRef = useRef(null);
      const sortableItemsRef = useRef(null);

      // --- 核心邏輯：載入群組與清單 ---
      useEffect(() => {
        const metaRef = db.collection('app_metadata').doc('group_list');
        const unsubMeta = metaRef.onSnapshot((docSnap) => {
          if (docSnap.exists) {
            const data = docSnap.data();
            setGroups(data.groups || []);
            if (data.groups && data.groups.length > 0 && !currentGroupId) {
              setCurrentGroupId(data.groups[0].id);
            }
          } else {
            const defaultGroups = [{ id: 'haohao_baby_list', name: '主清單' }];
            metaRef.set({ groups: defaultGroups });
            setGroups(defaultGroups);
            setCurrentGroupId('haohao_baby_list');
          }
        });
        return () => unsubMeta();
      }, []);

      useEffect(() => {
        if (!currentGroupId) return;
        setLoading(true);
        const docRef = db.collection('checklists').doc(currentGroupId);
        const unsubscribe = docRef.onSnapshot((docSnap) => {
          if (docSnap.exists) {
            const data = docSnap.data();
            setListData(data);
            setActiveCategoryId(prevId => {
              const stillExists = data.categories?.find(c => c.id === prevId);
              return stillExists ? prevId : (data.categories?.[0]?.id || '');
            });
          } else {
            docRef.set(defaultData);
            setListData(defaultData);
            setActiveCategoryId(defaultData.categories[0].id);
          }
          setLoading(false);
        });
        return () => unsubscribe();
      }, [currentGroupId]);

      const updateData = (newData) => {
        setListData(newData);
        if (currentGroupId) db.collection('checklists').doc(currentGroupId).set(newData);
      };

      // --- 群組操作 ---
      const handleAddGroup = () => {
        if (!newGroupInput.trim()) return;
        const newId = `group_${Date.now()}`;
        const updatedGroups = [...groups, { id: newId, name: newGroupInput.trim() }];
        
        db.collection('app_metadata').doc('group_list').set({ groups: updatedGroups });
        db.collection('checklists').doc(newId).set(defaultData);
        
        setNewGroupInput('');
        setCurrentGroupId(newId);
        setIsGroupModalOpen(false);
      };

      const handleDeleteGroupClick = (targetGroupId) => {
        if (groups.length <= 1) return;
        setGroupToDelete(targetGroupId); 
      };

      const confirmDeleteGroup = () => {
        if (!groupToDelete) return;
        const updatedGroups = groups.filter(g => g.id !== groupToDelete);
        db.collection('app_metadata').doc('group_list').set({ groups: updatedGroups });
        if (currentGroupId === groupToDelete) setCurrentGroupId(updatedGroups[0].id);
        setGroupToDelete(null); 
      };

      const saveEditedGroup = (groupId) => {
        if (editGroupValue.trim()) {
          const updatedGroups = groups.map(g => g.id === groupId ? { ...g, name: editGroupValue.trim() } : g);
          db.collection('app_metadata').doc('group_list').set({ groups: updatedGroups });
        }
        setEditingGroupId(null);
      };

      const handlePressStart = (group) => {
        isLongPressTriggered.current = false;
        longPressTimer.current = setTimeout(() => {
          isLongPressTriggered.current = true;
          setEditingGroupId(group.id);
          setEditGroupValue(group.name);
        }, 500);
      };

      const handlePressEnd = () => {
        if (longPressTimer.current) clearTimeout(longPressTimer.current);
      };

      // --- 拖曳排序邏輯 ---
      useEffect(() => {
        if (!isEditMode || !tabsRef.current) return;
        let nextSibling = null;
        sortableTabsRef.current = Sortable.create(tabsRef.current, {
          animation: 200, delay: 200, delayOnTouchOnly: true, direction: 'horizontal',
          filter: '.ignore-drag, input, button', preventOnFilter: false, ghostClass: 'sortable-ghost',
          onStart: (evt) => { nextSibling = evt.item.nextElementSibling; },
          onEnd: (evt) => {
            if (evt.oldIndex === evt.newIndex) return;
            if (nextSibling) evt.from.insertBefore(evt.item, nextSibling);
            else evt.from.appendChild(evt.item);

            setListData(prevData => {
              const newCats = Array.from(prevData.categories);
              const [moved] = newCats.splice(evt.oldIndex, 1);
              newCats.splice(evt.newIndex, 0, moved);
              const newData = { ...prevData, categories: newCats };
              if(currentGroupId) db.collection('checklists').doc(currentGroupId).set(newData);
              return newData;
            });
          }
        });
        return () => { if (sortableTabsRef.current) sortableTabsRef.current.destroy(); };
      }, [isEditMode, currentGroupId]);

      useEffect(() => {
        if (!isEditMode || !itemsRef.current) return;
        let nextSibling = null;
        sortableItemsRef.current = Sortable.create(itemsRef.current, {
          animation: 200, handle: '.drag-handle', filter: '.ignore-drag, input, button', preventOnFilter: false, ghostClass: 'sortable-ghost',
          onStart: (evt) => { nextSibling = evt.item.nextElementSibling; },
          onEnd: (evt) => {
            if (evt.oldIndex === evt.newIndex) return;
            if (nextSibling) evt.from.insertBefore(evt.item, nextSibling);
            else evt.from.appendChild(evt.item);

            setListData(prevData => {
              const newData = { ...prevData };
              const category = newData.categories.find(c => c.id === activeCategoryId);
              if (category) {
                const newItems = Array.from(category.items);
                const [moved] = newItems.splice(evt.oldIndex, 1);
                newItems.splice(evt.newIndex, 0, moved);
                category.items = newItems;
                if(currentGroupId) db.collection('checklists').doc(currentGroupId).set(newData);
              }
              return newData;
            });
          }
        });
        return () => { if (sortableItemsRef.current) sortableItemsRef.current.destroy(); };
      }, [isEditMode, activeCategoryId, currentGroupId]);

      // --- 清單與項目操作 ---
      const toggleItem = (categoryId, itemId) => {
        const newData = { ...listData };
        const category = newData.categories.find(c => c.id === categoryId);
        if (category) {
          const item = category.items.find(i => i.id === itemId);
          if (item) { item.checked = !item.checked; updateData(newData); }
        }
      };

      const saveEditedItem = (categoryId, itemId) => {
        if (editItemValue.trim()) {
          const newData = { ...listData };
          const category = newData.categories.find(c => c.id === categoryId);
          if (category) {
            const item = category.items.find(i => i.id === itemId);
            if (item) { item.name = editItemValue.trim(); updateData(newData); }
          }
        }
        setEditingItemId(null);
      };

      const saveEditedCategory = (categoryId) => {
        if (editCategoryValue.trim()) {
          const newData = { ...listData };
          const category = newData.categories.find(c => c.id === categoryId);
          if (category) { category.name = editCategoryValue.trim(); updateData(newData); }
        }
        setEditingCategoryId(null);
      };

      const addItem = (categoryId) => {
        if (!newItemName.trim()) return;
        const newData = { ...listData };
        const category = newData.categories.find(c => c.id === categoryId);
        if (category) {
          category.items.push({ id: `i_${Date.now()}_${Math.random().toString(36).substr(2, 5)}`, name: newItemName.trim(), checked: false });
          updateData(newData);
          setNewItemName('');
        }
      };

      const deleteItem = (categoryId, itemId) => {
        const newData = { ...listData };
        const category = newData.categories.find(c => c.id === categoryId);
        if (category) {
          category.items = category.items.filter(i => i.id !== itemId);
          updateData(newData);
        }
      };

      const addCategory = () => {
        if (!newCategoryName.trim()) return;
        const newId = `c_${Date.now()}_${Math.random().toString(36).substr(2, 5)}`;
        const newData = { ...listData };
        newData.categories.push({ id: newId, name: newCategoryName.trim(), items: [] });
        updateData(newData);
        setNewCategoryName('');
        setActiveCategoryId(newId);
      };

      const deleteCategory = (categoryId) => {
        const newData = { ...listData };
        newData.categories = newData.categories.filter(c => c.id !== categoryId);
        updateData(newData);
        if (activeCategoryId === categoryId && newData.categories.length > 0) setActiveCategoryId(newData.categories[0].id);
      };

      const resetAllChecks = () => {
        const newData = { ...listData };
        newData.categories.forEach(category => category.items.forEach(item => item.checked = false));
        updateData(newData);
      };

      const handleCategoryClick = (catId, catName) => {
        if (isEditMode) {
          if (activeCategoryId === catId) { setEditingCategoryId(catId); setEditCategoryValue(catName); }
          else setActiveCategoryId(catId);
        } else setActiveCategoryId(catId);
      };

      const toggleEditMode = () => { setIsEditMode(!isEditMode); setEditingItemId(null); setEditingCategoryId(null); };

      // --- 渲染畫面 ---
      const activeCategory = listData.categories?.find(c => c.id === activeCategoryId);
      const currentGroupName = groups.find(g => g.id === currentGroupId)?.name || '未命名群組';

      if (loading) return (
        <div className="flex items-center justify-center min-h-screen text-[#5C554B] font-medium" style={{ fontFamily: girlFontFamily }}>
          <RefreshCw className="w-5 h-5 animate-spin mr-3 text-[#7A9874]" />
          <span className="text-[15px] tracking-wider">連線至雲端清單中...</span>
        </div>
      );

      return (
        <div className="min-h-screen pb-24 pb-safe selection:bg-[#E6E4DD] text-[#5A5245]" style={{ fontFamily: girlFontFamily }}>
          
          {/* 🌟 頂部標題列 */}
          <div className="bg-white/90 backdrop-blur-md px-4 py-4 md:py-5 pt-safe sticky top-0 z-20 border-b border-[#EBE9E0] shadow-sm">
            <div className="max-w-lg mx-auto flex items-center justify-center relative min-h-[50px]">
              
              <div className="flex flex-col items-center text-center">
                <h1 className="text-[26px] text-[#4A5048] tracking-[0.05em] leading-[1]" style={{ fontWeight: 'bold' }}>
                  CHECK LIST
                </h1>
                <h2 className="text-[15px] font-bold text-[#A89F91] leading-[1] mt-2 flex items-center justify-center">
                  <span className="bg-[#FAF9F6] px-3 py-1 rounded-md border border-[#F0EFEA] tracking-widest">{currentGroupName}</span>
                </h2>
              </div>
              
              <div className="absolute right-0 flex items-center gap-2">
                <button onClick={() => setIsGroupModalOpen(true)} className="flex items-center bg-[#F8F7F2] text-[#8F8475] px-3 py-1.5 sm:px-3 rounded-xl text-[12px] font-bold border border-[#EBE9E0] shadow-sm hover:bg-[#F0EFEA] active:scale-95 transition-all">
                  <Folder className="w-4 h-4 mr-0 sm:mr-1.5" />
                  <span className="hidden sm:inline">群組</span>
                </button>
                <button onClick={resetAllChecks} className="flex items-center bg-[#F8F7F2] text-[#8F8475] px-3 py-1.5 sm:px-3 rounded-xl text-[12px] font-bold border border-[#EBE9E0] shadow-sm hover:bg-[#F0EFEA] active:scale-95 transition-all">
                  <RefreshCw className="w-4 h-4 mr-0 sm:mr-1.5" />
                  <span className="hidden sm:inline">重置</span>
                </button>
              </div>

            </div>
          </div>

          <div className="max-w-lg mx-auto mt-4 px-4 sm:px-5">
            
            {/* 🌟 標籤分類列 (Tabs) */}
            <div className="flex overflow-x-auto gap-2 pb-2 pt-1 hide-scrollbar" ref={tabsRef}>
              {listData.categories?.map((cat) => (
                <div key={cat.id} className="relative shrink-0">
                  {editingCategoryId === cat.id ? (
                    <input
                      autoFocus
                      className="w-20 px-3 py-1.5 rounded-full border border-[#7A9874] bg-white focus:outline-none text-[14px] font-bold text-[#5A5245] shadow-sm text-center"
                      value={editCategoryValue}
                      onChange={(e) => setEditCategoryValue(e.target.value)}
                      onBlur={() => saveEditedCategory(cat.id)}
                      onKeyDown={(e) => {
                        if (e.key === 'Enter') saveEditedCategory(cat.id);
                        if (e.key === 'Escape') setEditingCategoryId(null);
                      }}
                    />
                  ) : (
                    <button 
                      onClick={() => handleCategoryClick(cat.id, cat.name)} 
                      className={`px-4 py-1.5 rounded-full font-bold text-[14px] transition-all duration-300 tracking-widest flex items-center justify-center select-none shadow-sm
                        ${activeCategoryId === cat.id ? 'bg-[#7A9874] text-white' : 'bg-white border border-[#EBE9E0] text-[#A89F91] hover:bg-[#F8F7F2]'}
                        ${isEditMode && activeCategoryId === cat.id ? 'underline decoration-dashed underline-offset-4' : ''}
                      `}
                    >
                      {cat.name}
                    </button>
                  )}
                  {isEditMode && editingCategoryId !== cat.id && (
                    <button onClick={(e) => { e.stopPropagation(); deleteCategory(cat.id); }} className="absolute -top-1.5 -right-1.5 bg-[#D1CCC2] text-white rounded-full p-1 shadow-sm z-10 hover:bg-[#A89F91] active:scale-90 ignore-drag border border-white">
                      <X className="w-2.5 h-2.5 font-bold" />
                    </button>
                  )}
                </div>
              ))}
              
              {isEditMode && (
                <div className="shrink-0 flex items-center ignore-drag bg-white border border-[#EBE9E0] shadow-sm rounded-full overflow-hidden h-[30px]">
                  <input 
                    type="text" 
                    placeholder="新分類..." 
                    className="w-20 pl-3 pr-1.5 py-1.5 bg-transparent focus:outline-none text-[13px] tracking-widest text-[#5A5245] font-bold" 
                    value={newCategoryName} 
                    onChange={(e) => setNewCategoryName(e.target.value)} 
                    onKeyPress={(e) => e.key === 'Enter' && addCategory()} 
                  />
                  <div className="w-[1px] h-4 bg-[#EBE9E0]"></div>
                  <button 
                    onClick={addCategory} 
                    className="px-2.5 py-1.5 bg-transparent text-[#A89F91] hover:text-[#5A5245] transition-colors flex items-center justify-center"
                  >
                    <Plus className="w-4 h-4" />
                  </button>
                </div>
              )}
            </div>

            {/* 🌟 模式切換面板 */}
            <div className="mt-3 mb-4 bg-white rounded-[16px] p-2.5 flex justify-between items-center shadow-sm border border-[#F0EFEA]">
              <div className={`flex items-center font-bold text-[13px] ml-2 tracking-widest ${isEditMode ? 'text-[#C78B73]' : 'text-[#8F8475]'}`}>
                {isEditMode ? <Unlock className="w-4 h-4 mr-1.5" /> : <Lock className="w-4 h-4 mr-1.5" />}
                目前為{isEditMode ? '編輯' : '瀏覽'}模式
              </div>
              <button onClick={toggleEditMode} className={`px-4 py-1.5 rounded-full text-white text-[12px] font-bold shadow-sm transition-all flex items-center tracking-widest active:scale-95 ${isEditMode ? 'bg-[#C78B73]' : 'bg-[#7A9874]'}`}>
                {isEditMode ? <Unlock className="w-3.5 h-3.5 mr-1.5" /> : <Lock className="w-3.5 h-3.5 mr-1.5" />}
                {isEditMode ? '完成編輯' : '解鎖編輯'}
              </button>
            </div>

            {/* 🌟 清單主卡片 */}
            {activeCategory && (
              <div className="bg-white rounded-[22px] shadow-[0_4px_20px_rgba(0,0,0,0.04)] mt-5 p-4 sm:p-5 border-[6px] border-white min-h-[40vh] flex flex-col">
                
                {/* 待辦項目清單 (可拖曳區塊) */}
                <div className="space-y-3 flex-1" ref={itemsRef}>
                  {activeCategory.items.map((item) => (
                    <div key={item.id} className="relative group">
                      <div onClick={() => !isEditMode && toggleItem(activeCategory.id, item.id)} className={`bg-[#FAF9F6] rounded-[16px] pl-4 pr-3 py-3.5 flex items-center justify-between transition-all ${!isEditMode ? 'cursor-pointer active:scale-[0.98]' : ''}`}>
                        
                        <div className="flex items-center flex-1 pr-2">
                          <div onClick={(e) => { if(isEditMode) { e.stopPropagation(); toggleItem(activeCategory.id, item.id); } }} 
                               className={`w-[22px] h-[22px] rounded-[6px] mr-3.5 flex-shrink-0 flex items-center justify-center transition-all cursor-pointer
                               ${item.checked ? 'bg-[#7A9874] border-transparent shadow-sm' : 'bg-white border-[1.5px] border-[#C2BDB4]'}`}>
                            {item.checked && <Check className="w-3.5 h-3.5 text-white" />}
                          </div>

                          {editingItemId === item.id ? (
                            <input
                              type="text" autoFocus
                              className="flex-1 bg-transparent border-b-[1.5px] border-[#7A9874] focus:outline-none text-[15px] font-bold text-[#5A5245] tracking-wider px-1 py-0.5"
                              value={editItemValue}
                              onChange={(e) => setEditItemValue(e.target.value)}
                              onBlur={() => saveEditedItem(activeCategory.id, item.id)}
                              onKeyDown={(e) => {
                                if (e.key === 'Enter') saveEditedItem(activeCategory.id, item.id);
                                if (e.key === 'Escape') setEditingItemId(null);
                              }}
                              onClick={(e) => e.stopPropagation()}
                            />
                          ) : (
                            <span 
                              className={`text-[15px] font-bold tracking-wider transition-all select-none
                                ${item.checked ? 'line-through text-[#B5AEA3]' : 'text-[#5A5245]'} 
                                ${isEditMode && !item.checked ? 'cursor-text hover:text-[#7A9874] hover:underline decoration-dashed underline-offset-4' : ''}`}
                              onClick={(e) => {
                                if (isEditMode && !item.checked) {
                                  e.stopPropagation(); setEditingItemId(item.id); setEditItemValue(item.name);
                                }
                              }}
                            >
                              {item.name}
                            </span>
                          )}
                        </div>

                        <div className="flex items-center flex-shrink-0 ml-2">
                          {isEditMode ? (
                            <>
                              <div className="drag-handle p-2 text-[#C2BDB4] cursor-grab active:cursor-grabbing hover:text-[#5A5245] transition-colors mr-1 touch-none">
                                <GripLines className="w-4 h-4" />
                              </div>
                              <button onClick={(e) => { e.stopPropagation(); deleteItem(activeCategory.id, item.id); }} className="bg-white border border-[#EBE9E0] p-1.5 rounded-full text-[#C78B73] shadow-sm active:scale-90 transition-transform">
                                <Trash2 className="w-3.5 h-3.5" />
                              </button>
                            </>
                          ) : (
                            <div className="text-[#C2BDB4] pr-1">
                              <ArrowLeft className="w-[18px] h-[18px] opacity-40" />
                            </div>
                          )}
                        </div>
                      </div>
                    </div>
                  ))}
                </div>

                {/* 新增項目輸入框 */}
                {isEditMode && (
                  <div className="mt-5 pt-4 border-t-[1.5px] border-dashed border-[#F0EFEA]">
                     <div className="bg-[#FAF9F6] rounded-[16px] pl-3.5 pr-1.5 py-1.5 flex items-center border-[1.5px] border-dashed border-[#EBE9E0] shadow-sm">
                        <Plus className="w-4 h-4 text-[#A89F91] mr-2 flex-shrink-0" />
                        <input 
                          type="text" 
                          placeholder="新增待辦事項..." 
                          className="flex-1 bg-transparent border-none focus:outline-none text-[14px] font-bold text-[#5A5245] py-2 tracking-wider placeholder-[#C2BDB4]" 
                          value={newItemName} 
                          onChange={(e) => setNewItemName(e.target.value)} 
                          onKeyPress={(e) => e.key === 'Enter' && addItem(activeCategory.id)} 
                        />
                        <button 
                          onClick={() => addItem(activeCategory.id)} 
                          className="bg-[#5A5245] text-white p-2 rounded-xl shadow-sm hover:bg-[#4A4338] transition-colors active:scale-95"
                        >
                          <Plus className="w-4 h-4" />
                        </button>
                     </div>
                  </div>
                )}
              </div>
            )}
          </div>

          {/* 🌟 群組選擇彈出視窗 (Modal) */}
          {isGroupModalOpen && (
            <div className="fixed inset-0 bg-[#5A5245]/20 backdrop-blur-[2px] z-50 flex items-center justify-center p-4">
              <div className="bg-white rounded-[24px] w-full max-w-sm shadow-2xl border border-[#F0EFEA] overflow-hidden flex flex-col animate-[fadeIn_0.2s_ease-out]">
                
                <div className="px-5 py-4 border-b border-[#F0EFEA] flex justify-between items-center bg-[#FAF9F6]">
                  <h3 className="font-bold text-[#5A5245] tracking-widest text-[17px] flex items-center">
                    <Folder className="w-4 h-4 mr-2" /> 群組管理
                  </h3>
                  <button onClick={() => setIsGroupModalOpen(false)} className="text-[#A89F91] hover:text-[#5A5245] p-1 rounded-full hover:bg-white transition-colors">
                    <X className="w-4 h-4"/>
                  </button>
                </div>
                
                <div className="p-4 max-h-[50vh] overflow-y-auto space-y-3 bg-white hide-scrollbar">
                  {groups.map(group => (
                     <div key={group.id} className="flex items-center gap-2 relative">
                        {editingGroupId === group.id ? (
                          <input
                            autoFocus
                            className="flex-1 px-4 py-4 rounded-[16px] font-bold tracking-wider text-[15px] border-[1.5px] border-[#7A9874] outline-none shadow-sm text-[#5A5245] bg-white"
                            value={editGroupValue}
                            onChange={(e) => setEditGroupValue(e.target.value)}
                            onBlur={() => saveEditedGroup(group.id)}
                            onKeyDown={(e) => {
                              if (e.key === 'Enter') saveEditedGroup(group.id);
                              if (e.key === 'Escape') setEditingGroupId(null);
                            }}
                          />
                        ) : (
                          <button 
                            onTouchStart={() => handlePressStart(group)}
                            onTouchEnd={handlePressEnd}
                            onTouchMove={handlePressEnd}
                            onMouseDown={() => handlePressStart(group)}
                            onMouseUp={handlePressEnd}
                            onMouseLeave={handlePressEnd}
                            style={{ WebkitTouchCallout: 'none', userSelect: 'none' }}
                            onClick={(e) => {
                              if (isLongPressTriggered.current) { e.preventDefault(); return; }
                              setCurrentGroupId(group.id); 
                              setIsGroupModalOpen(false); 
                            }}
                            className={`flex-1 text-left px-4 py-4 rounded-[16px] font-bold tracking-wider text-[15px] transition-all border shadow-sm flex items-center justify-between select-none
                              ${currentGroupId === group.id ? 'bg-[#7A9874] text-white border-[#7A9874]' : 'bg-[#FAF9F6] text-[#5A5245] border-[#EBE9E0] hover:bg-[#F0EFEA]'}`}
                          >
                            <span>{group.name}</span>
                            {currentGroupId === group.id && <Check className="w-4 h-4 text-white" />}
                          </button>
                        )}

                        {groups.length > 1 && editingGroupId !== group.id && (
                          <button onClick={() => handleDeleteGroupClick(group.id)} className="p-4 text-[#C2BDB4] hover:text-[#C78B73] transition-colors bg-[#FAF9F6] rounded-[16px] border border-[#EBE9E0] shadow-sm active:scale-95">
                            <Trash2 className="w-4 h-4" />
                          </button>
                        )}
                     </div>
                  ))}
                  
                  <div className="text-[13px] text-[#A89F91] text-center pt-2.5 flex items-center justify-center font-bold tracking-widest opacity-80">
                    💡 提示：長按群組名稱可重新命名
                  </div>
                </div>

                <div className="p-4 border-t border-[#F0EFEA] bg-[#FAF9F6]">
                   <div className="flex items-center border-[2px] border-dashed border-[#C2BDB4] rounded-[16px] p-1.5 bg-white focus-within:border-[#7A9874] transition-colors shadow-sm">
                      <input 
                        type="text" 
                        placeholder="新增群組 (如: 國內旅遊)" 
                        className="flex-1 px-4 py-2.5 bg-transparent outline-none text-[14px] font-bold text-[#5A5245] placeholder-[#C2BDB4] tracking-wider"
                        value={newGroupInput}
                        onChange={e => setNewGroupInput(e.target.value)}
                        onKeyPress={e => e.key === 'Enter' && handleAddGroup()}
                      />
                      <button onClick={handleAddGroup} className="bg-[#5A5245] text-white p-2.5 rounded-xl active:scale-95 transition-transform hover:bg-[#4A4338]">
                        <Plus className="w-4 h-4"/>
                      </button>
                   </div>
                </div>

              </div>
            </div>
          )}

          {/* 🌟 刪除確認彈出視窗 */}
          {groupToDelete && (
            <div className="fixed inset-0 bg-[#5A5245]/40 backdrop-blur-[2px] z-[60] flex items-center justify-center p-4">
              <div className="bg-white rounded-[24px] w-full max-w-[300px] shadow-2xl border border-[#F0EFEA] p-6 text-center">
                <div className="w-14 h-14 bg-[#FFF4F2] rounded-full flex items-center justify-center mx-auto mb-4">
                  <Trash2 className="w-7 h-7 text-[#C78B73]" />
                </div>
                <h3 className="font-bold text-[#5A5245] text-[17px] mb-2.5 tracking-widest">確定要刪除嗎？</h3>
                <p className="text-[#A89F91] text-[14px] mb-6 tracking-wider leading-relaxed">
                  刪除群組後，裡面的所有<br/>待辦事項將會永久遺失喔！
                </p>
                <div className="flex gap-3">
                  <button 
                    onClick={() => setGroupToDelete(null)} 
                    className="flex-1 py-3 rounded-xl font-bold text-[#8F8475] bg-[#F8F7F2] border border-[#EBE9E0] active:scale-95 transition-transform"
                  >
                    取消
                  </button>
                  <button 
                    onClick={confirmDeleteGroup} 
                    className="flex-1 py-3 rounded-xl font-bold text-white bg-[#C78B73] active:scale-95 transition-transform shadow-sm"
                  >
                    確認刪除
                  </button>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
