<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="HAO-HAO">
  <title>HAO-HAO Check List</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>

  <style>
    body { -webkit-overflow-scrolling: touch; -webkit-tap-highlight-color: transparent; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    @import url('https://fonts.googleapis.com/css2?family=Yomogi&family=Kosugi+Maru&display=swap');
    
    .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
    .pt-safe { padding-top: env(safe-area-inset-top); }

    .sortable-ghost { opacity: 0.3; transform: scale(0.98); background-color: #F8F7F2; border: 1.5px dashed #C2BDB4; }
    .sortable-drag { cursor: grabbing !important; }

    /* 清單區域的日系點點背景 (縮小尺寸) */
    .bg-dot-pattern {
      background-color: #F8F7F2;
      background-image: radial-gradient(#DEDCD0 1.5px, transparent 1.5px);
      background-size: 18px 18px;
    }
  </style>
</head>
<body class="bg-white">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ==========================================
    // 👇 Firebase 專屬設定 👇
    // ==========================================
    const firebaseConfig = {
      apiKey: "AIzaSyBfJd0gZQ2ZHZTkpMbt8TvbrhwoZPupanU",
      authDomain: "webapp-9f6b5.firebaseapp.com",
      projectId: "webapp-9f6b5",
      storageBucket: "webapp-9f6b5.firebasestorage.app",
      messagingSenderId: "315187495447",
      appId: "1:315187495447:web:48d730e6343a1e21831252"
    };

    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.firestore();
    // ==========================================

    // 圖示庫
    const Icon = ({ path, className = "w-3.5 h-3.5", strokeWidth = 2.5 }) => (
      <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={strokeWidth}>
        <path strokeLinecap="round" strokeLinejoin="round" d={path} />
      </svg>
    );
    const Plus = ({className}) => <Icon className={className} path="M12 4v16m8-8H4" />;
    const Trash2 = ({className}) => <Icon className={className} path="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />;
    const Check = ({className}) => <Icon className={className} path="M5 13l4 4L19 7" strokeWidth={3.5} />;
    const RefreshCw = ({className}) => <Icon className={className} path="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />;
    const Lock = ({className}) => <Icon className={className} path="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />;
    const Unlock = ({className}) => <Icon className={className} path="M8 11V7a4 4 0 118 0m-4 8v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2z" />;
    const X = ({className}) => <Icon className={className} path="M6 18L18 6M6 6l12 12" />;
    const GripLines = ({className}) => <Icon className={className} path="M4 9h16M4 15h16" strokeWidth={2} />;
    const ArrowLeft = ({className, strokeWidth = 2.5}) => (
      <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round">
        <path d="M19 12H5M12 19l-7-7 7-7" />
      </svg>
    );

    const defaultData = {
      categories: [
        { id: 'c1', name: '換尿布', items: [{ id: 'i1_1', name: '尿布 (3-5片)', checked: true }, { id: 'i1_2', name: '濕紙巾', checked: false }, { id: 'i1_3', name: '屁屁膏', checked: false }] },
        { id: 'c2', name: '餵食', items: [{ id: 'i2_1', name: '奶瓶', checked: false }, { id: 'i2_2', name: '奶粉 (分裝盒)', checked: false }, { id: 'i2_3', name: '保溫瓶 (熱水)', checked: false }, { id: 'i2_4', name: '副食品/零食', checked: false }] }
      ]
    };

    const girlFontFamily = '"華康少女文字", "華康少女文字W5", "DFGirl-W5", "DFPGirl-W5", "Yomogi", "Kosugi Maru", sans-serif';

    function App() {
      const [listData, setListData] = useState({ categories: [] });
      const [loading, setLoading] = useState(true);
      const [isEditMode, setIsEditMode] = useState(false);
      const [activeCategoryId, setActiveCategoryId] = useState('');
      
      const [newCategoryName, setNewCategoryName] = useState('');
      const [newItemName, setNewItemName] = useState('');
      
      const [editingItemId, setEditingItemId] = useState(null);
      const [editItemValue, setEditItemValue] = useState('');
      const [editingCategoryId, setEditingCategoryId] = useState(null);
      const [editCategoryValue, setEditCategoryValue] = useState('');

      const tabsRef = useRef(null);
      const itemsRef = useRef(null);
      const sortableTabsRef = useRef(null);
      const sortableItemsRef = useRef(null);

      // 初始化與監聽 Firebase
      useEffect(() => {
        const docRef = db.collection('checklists').doc('haohao_baby_list');
        const unsubscribe = docRef.onSnapshot((docSnap) => {
          if (docSnap.exists) {
            const data = docSnap.data();
            setListData(data);
            // 確保有預設選取的分類
            setActiveCategoryId(prevId => {
              const stillExists = data.categories?.find(c => c.id === prevId);
              return stillExists ? prevId : (data.categories?.[0]?.id || '');
            });
          } else {
            docRef.set(defaultData);
            setListData(defaultData);
            setActiveCategoryId(defaultData.categories[0].id);
          }
          setLoading(false);
        });
        return () => unsubscribe();
      }, []);

      // 優化後的資料更新函數 (樂觀更新 + 寫入 Firebase)
      const updateData = (newData) => {
        setListData(newData); // 畫面即時反應
        db.collection('checklists').doc('haohao_baby_list').set(newData); // 背景寫入雲端
      };

      // 優化: 標籤 (Tabs) 拖曳處理 - 解決 React DOM 衝突當機
      useEffect(() => {
        if (!isEditMode || !tabsRef.current) return;
        let nextSibling = null;
        
        sortableTabsRef.current = Sortable.create(tabsRef.current, {
          animation: 200, delay: 200, delayOnTouchOnly: true, direction: 'horizontal',
          filter: '.ignore-drag, input, button', preventOnFilter: false, ghostClass: 'sortable-ghost',
          onStart: (evt) => {
            // 記下拖曳前的相鄰元素
            nextSibling = evt.item.nextElementSibling;
          },
          onEnd: (evt) => {
            if (evt.oldIndex === evt.newIndex) return;
            
            // 【核心防當機邏輯】: 在 React 介入前，將 DOM 偷偷塞回原位
            if (nextSibling) {
              evt.from.insertBefore(evt.item, nextSibling);
            } else {
              evt.from.appendChild(evt.item);
            }

            // 更新 React State，讓 React 自己決定最終畫面長相
            setListData(prevData => {
              const newCats = Array.from(prevData.categories);
              const [moved] = newCats.splice(evt.oldIndex, 1);
              newCats.splice(evt.newIndex, 0, moved);
              const newData = { ...prevData, categories: newCats };
              db.collection('checklists').doc('haohao_baby_list').set(newData);
              return newData;
            });
          }
        });
        return () => { if (sortableTabsRef.current) sortableTabsRef.current.destroy(); };
      }, [isEditMode]);

      // 優化: 細項 (Items) 拖曳處理 - 解決 React DOM 衝突當機
      useEffect(() => {
        if (!isEditMode || !itemsRef.current) return;
        let nextSibling = null;

        sortableItemsRef.current = Sortable.create(itemsRef.current, {
          animation: 200, handle: '.drag-handle', filter: '.ignore-drag, input, button', preventOnFilter: false, ghostClass: 'sortable-ghost',
          onStart: (evt) => {
            nextSibling = evt.item.nextElementSibling;
          },
          onEnd: (evt) => {
            if (evt.oldIndex === evt.newIndex) return;
            
            // 【核心防當機邏輯】: 復原 DOM
            if (nextSibling) {
              evt.from.insertBefore(evt.item, nextSibling);
            } else {
              evt.from.appendChild(evt.item);
            }

            setListData(prevData => {
              const newData = { ...prevData };
              const category = newData.categories.find(c => c.id === activeCategoryId);
              if (category) {
                const newItems = Array.from(category.items);
                const [moved] = newItems.splice(evt.oldIndex, 1);
                newItems.splice(evt.newIndex, 0, moved);
                category.items = newItems;
                db.collection('checklists').doc('haohao_baby_list').set(newData);
              }
              return newData;
            });
          }
        });
        return () => { if (sortableItemsRef.current) sortableItemsRef.current.destroy(); };
      }, [isEditMode, activeCategoryId]);

      const toggleItem = (categoryId, itemId) => {
        const newData = { ...listData };
        const category = newData.categories.find(c => c.id === categoryId);
        if (category) {
          const item = category.items.find(i => i.id === itemId);
          if (item) item.checked = !item.checked;
          updateData(newData);
        }
      };

      const saveEditedItem = (categoryId, itemId) => {
        if (editItemValue.trim()) {
          const newData = { ...listData };
          const category = newData.categories.find(c => c.id === categoryId);
          if (category) {
            const item = category.items.find(i => i.id === itemId);
            if (item) { item.name = editItemValue.trim(); updateData(newData); }
          }
        }
        setEditingItemId(null);
      };

      const saveEditedCategory = (categoryId) => {
        if (editCategoryValue.trim()) {
          const newData = { ...listData };
          const category = newData.categories.find(c => c.id === categoryId);
          if (category) { category.name = editCategoryValue.trim(); updateData(newData); }
        }
        setEditingCategoryId(null);
      };

      const addItem = (categoryId) => {
        if (!newItemName.trim()) return;
        const newData = { ...listData };
        const category = newData.categories.find(c => c.id === categoryId);
        if (category) {
          category.items.push({ id: `i_${Date.now()}_${Math.random().toString(36).substr(2, 5)}`, name: newItemName.trim(), checked: false });
          updateData(newData);
          setNewItemName('');
        }
      };

      const deleteItem = (categoryId, itemId) => {
        const newData = { ...listData };
        const category = newData.categories.find(c => c.id === categoryId);
        if (category) {
          category.items = category.items.filter(i => i.id !== itemId);
          updateData(newData);
        }
      };

      const addCategory = () => {
        if (!newCategoryName.trim()) return;
        const newId = `c_${Date.now()}_${Math.random().toString(36).substr(2, 5)}`;
        const newData = { ...listData };
        newData.categories.push({ id: newId, name: newCategoryName.trim(), items: [] });
        updateData(newData);
        setNewCategoryName('');
        setActiveCategoryId(newId);
      };

      const deleteCategory = (categoryId) => {
        const newData = { ...listData };
        newData.categories = newData.categories.filter(c => c.id !== categoryId);
        updateData(newData);
        if (activeCategoryId === categoryId && newData.categories.length > 0) setActiveCategoryId(newData.categories[0].id);
      };

      const resetAllChecks = () => {
        const newData = { ...listData };
        newData.categories.forEach(category => category.items.forEach(item => item.checked = false));
        updateData(newData);
      };

      const handleCategoryClick = (catId, catName) => {
        if (isEditMode) {
          if (activeCategoryId === catId) { setEditingCategoryId(catId); setEditCategoryValue(catName); }
          else setActiveCategoryId(catId);
        } else setActiveCategoryId(catId);
      };

      const toggleEditMode = () => { setIsEditMode(!isEditMode); setEditingItemId(null); setEditingCategoryId(null); };

      if (loading) return (
        <div className="flex items-center justify-center min-h-screen text-[#5C554B] font-medium" style={{ fontFamily: girlFontFamily }}>
          <RefreshCw className="w-5 h-5 animate-spin mr-3 text-[#7A9874]" />
          <span className="text-[14.5px] tracking-wider">連線至雲端清單中...</span>
        </div>
      );

      const activeCategory = listData.categories?.find(c => c.id === activeCategoryId);

      return (
        <div className="min-h-screen pb-24 pb-safe selection:bg-[#E6E4DD] text-[#5A5245]" style={{ fontFamily: girlFontFamily }}>
          
          {/* 頂部標題 */}
          <div className="bg-white/90 backdrop-blur-md px-3.5 py-3.5 md:py-4 pt-safe sticky top-0 z-20 border-b border-[#EBE9E0] shadow-sm">
            <div className="max-w-lg mx-auto flex items-center justify-center relative min-h-[45px]">
              <div className="flex flex-col items-center text-center">
                <h1 className="text-[25px] text-[#4A5048] tracking-widest leading-[1]" style={{ fontWeight: 'bold' }}>
                  HAO-HAO
                </h1>
                <h2 className="text-[18px] font-bold text-[#A89F91] leading-[1] mt-1">
                  Check List
                </h2>
              </div>
              <button onClick={resetAllChecks} className="absolute right-0 flex items-center bg-[#F8F7F2] text-[#8F8475] px-2.5 py-1 sm:px-2.5 rounded-lg text-[11.5px] font-bold border border-[#EBE9E0] shadow-sm hover:bg-[#F0EFEA] active:scale-95 transition-all">
                <RefreshCw className="w-3.5 h-3.5 mr-0 sm:mr-1" />
                <span className="hidden sm:inline">重置</span>
              </button>
            </div>
          </div>

          <div className="max-w-lg mx-auto mt-3.5 px-3.5 sm:px-4">
            
            {/* 上方標籤 Tabs */}
            <div className="flex overflow-x-auto gap-1.5 pb-1.5 pt-1 hide-scrollbar" ref={tabsRef}>
              {listData.categories?.map((cat) => (
                <div key={cat.id} className="relative shrink-0">
                  {editingCategoryId === cat.id ? (
                    <input
                      autoFocus
                      className="w-16 px-2.5 py-1 rounded-full border border-[#7A9874] bg-white focus:outline-none text-[13.5px] font-bold text-[#5A5245] shadow-sm text-center"
                      value={editCategoryValue}
                      onChange={(e) => setEditCategoryValue(e.target.value)}
                      onBlur={() => saveEditedCategory(cat.id)}
                      onKeyDown={(e) => {
                        if (e.key === 'Enter') saveEditedCategory(cat.id);
                        if (e.key === 'Escape') setEditingCategoryId(null);
                      }}
                    />
                  ) : (
                    <button 
                      onClick={() => handleCategoryClick(cat.id, cat.name)} 
                      className={`px-3.5 py-1 rounded-full font-bold text-[13.5px] transition-all duration-300 tracking-widest flex items-center justify-center select-none shadow-sm
                        ${activeCategoryId === cat.id ? 'bg-[#7A9874] text-white' : 'bg-white border border-[#EBE9E0] text-[#A89F91] hover:bg-[#F8F7F2]'}
                        ${isEditMode && activeCategoryId === cat.id ? 'underline decoration-dashed underline-offset-4' : ''}
                      `}
                    >
                      {cat.name}
                    </button>
                  )}
                  {isEditMode && editingCategoryId !== cat.id && (
                    <button onClick={(e) => { e.stopPropagation(); deleteCategory(cat.id); }} className="absolute -top-1 -right-1 bg-[#D1CCC2] text-white rounded-full p-1 shadow-sm z-10 hover:bg-[#A89F91] active:scale-90 ignore-drag border border-white">
                      <X className="w-2 h-2 font-bold" />
                    </button>
                  )}
                </div>
              ))}
              
              {isEditMode && (
                <div className="shrink-0 flex items-center ignore-drag bg-white border border-[#EBE9E0] shadow-sm rounded-full overflow-hidden h-[26px]">
                  <input 
                    type="text" 
                    placeholder="新分類..." 
                    className="w-16 pl-2.5 pr-1 py-1 bg-transparent focus:outline-none text-[12.5px] tracking-widest text-[#5A5245] font-bold" 
                    value={newCategoryName} 
                    onChange={(e) => setNewCategoryName(e.target.value)} 
                    onKeyPress={(e) => e.key === 'Enter' && addCategory()} 
                  />
                  <div className="w-[1px] h-3.5 bg-[#EBE9E0]"></div>
                  <button 
                    onClick={addCategory} 
                    className="px-2 py-1 bg-transparent text-[#A89F91] hover:text-[#5A5245] transition-colors flex items-center justify-center"
                  >
                    <Plus className="w-3.5 h-3.5" />
                  </button>
                </div>
              )}
            </div>

            {/* 模式切換面板 */}
            <div className="mt-2.5 mb-3.5 bg-white rounded-[14px] p-2 flex justify-between items-center shadow-sm border border-[#F0EFEA]">
              <div className={`flex items-center font-bold text-[12.5px] ml-1.5 tracking-widest ${isEditMode ? 'text-[#C78B73]' : 'text-[#8F8475]'}`}>
                {isEditMode ? <Unlock className="w-3.5 h-3.5 mr-1" /> : <Lock className="w-3.5 h-3.5 mr-1" />}
                目前為{isEditMode ? '編輯' : '瀏覽'}模式
              </div>
              <button onClick={toggleEditMode} className={`px-3.5 py-1 rounded-full text-white text-[11.5px] font-bold shadow-sm transition-all flex items-center tracking-widest active:scale-95 ${isEditMode ? 'bg-[#C78B73]' : 'bg-[#7A9874]'}`}>
                {isEditMode ? <Unlock className="w-3 h-3 mr-1" /> : <Lock className="w-3 h-3 mr-1" />}
                {isEditMode ? '完成編輯' : '解鎖編輯'}
              </button>
            </div>

            {/* 手帳風：純色紙張背景與清單區域 */}
            {activeCategory && (
              <div className="bg-white rounded-[20px] shadow-[0_4px_20px_rgba(0,0,0,0.04)] mt-4 p-3.5 sm:p-4 border-[5px] border-white min-h-[40vh] flex flex-col">
                
                {/* 細項清單 (可拖曳區塊，與新增欄完全隔離) */}
                <div className="space-y-2.5 flex-1" ref={itemsRef}>
                  {activeCategory.items.map((item) => (
                    <div key={item.id} className="relative group">
                      <div onClick={() => !isEditMode && toggleItem(activeCategory.id, item.id)} className={`bg-[#FAF9F6] rounded-[14px] pl-3.5 pr-2.5 py-3 flex items-center justify-between transition-all ${!isEditMode ? 'cursor-pointer active:scale-[0.98]' : ''}`}>
                        
                        <div className="flex items-center flex-1 pr-2">
                          
                          {/* 方形 Checkbox */}
                          <div onClick={(e) => { if(isEditMode) { e.stopPropagation(); toggleItem(activeCategory.id, item.id); } }} 
                               className={`w-[20px] h-[20px] rounded-[5px] mr-3 flex-shrink-0 flex items-center justify-center transition-all cursor-pointer
                               ${item.checked ? 'bg-[#7A9874] border-transparent shadow-sm' : 'bg-white border-[1.5px] border-[#C2BDB4]'}`}>
                            {item.checked && <Check className="w-3 h-3 text-white" />}
                          </div>

                          {/* 項目文字 */}
                          {editingItemId === item.id ? (
                            <input
                              type="text" autoFocus
                              className="flex-1 bg-transparent border-b-[1.5px] border-[#7A9874] focus:outline-none text-[14.5px] font-bold text-[#5A5245] tracking-wider px-1 py-0.5"
                              value={editItemValue}
                              onChange={(e) => setEditItemValue(e.target.value)}
                              onBlur={() => saveEditedItem(activeCategory.id, item.id)}
                              onKeyDown={(e) => {
                                if (e.key === 'Enter') saveEditedItem(activeCategory.id, item.id);
                                if (e.key === 'Escape') setEditingItemId(null);
                              }}
                              onClick={(e) => e.stopPropagation()}
                            />
                          ) : (
                            <span 
                              className={`text-[14.5px] font-bold tracking-wider transition-all select-none
                                ${item.checked ? 'line-through text-[#B5AEA3]' : 'text-[#5A5245]'} 
                                ${isEditMode && !item.checked ? 'cursor-text hover:text-[#7A9874] hover:underline decoration-dashed underline-offset-4' : ''}`}
                              onClick={(e) => {
                                if (isEditMode && !item.checked) {
                                  e.stopPropagation(); setEditingItemId(item.id); setEditItemValue(item.name);
                                }
                              }}
                            >
                              {item.name}
                            </span>
                          )}
                        </div>

                        {/* 右側箭頭或編輯工具 */}
                        <div className="flex items-center flex-shrink-0 ml-2">
                          {isEditMode ? (
                            <>
                              <div className="drag-handle p-1.5 text-[#C2BDB4] cursor-grab active:cursor-grabbing hover:text-[#5A5245] transition-colors mr-1 touch-none">
                                <GripLines className="w-3.5 h-3.5" />
                              </div>
                              <button onClick={(e) => { e.stopPropagation(); deleteItem(activeCategory.id, item.id); }} className="bg-white border border-[#EBE9E0] p-1 rounded-full text-[#C78B73] shadow-sm active:scale-90 transition-transform">
                                <Trash2 className="w-3 h-3" />
                              </button>
                            </>
                          ) : (
                            <div className="text-[#C2BDB4] pr-1">
                              {/* 淡淡的向左箭頭 */}
                              <ArrowLeft className="w-[16px] h-[16px] opacity-40" />
                            </div>
                          )}
                        </div>
                      </div>
                    </div>
                  ))}
                </div>

                {/* 新增細項輸入框 (獨立擺放，確保永遠在最底部不受干擾) */}
                {isEditMode && (
                  <div className="mt-4 pt-3 border-t-[1.5px] border-dashed border-[#F0EFEA]">
                     <div className="bg-[#FAF9F6] rounded-[14px] pl-3 pr-1 py-1 flex items-center border-[1.5px] border-dashed border-[#EBE9E0] shadow-sm">
                        <Plus className="w-3.5 h-3.5 text-[#A89F91] mr-1.5 flex-shrink-0" />
                        <input 
                          type="text" 
                          placeholder="新增待辦事項..." 
                          className="flex-1 bg-transparent border-none focus:outline-none text-[13.5px] font-bold text-[#5A5245] py-1.5 tracking-wider placeholder-[#C2BDB4]" 
                          value={newItemName} 
                          onChange={(e) => setNewItemName(e.target.value)} 
                          onKeyPress={(e) => e.key === 'Enter' && addItem(activeCategory.id)} 
                        />
                        <button 
                          onClick={() => addItem(activeCategory.id)} 
                          className="bg-[#5A5245] text-white p-1.5 rounded-lg shadow-sm hover:bg-[#4A4338] transition-colors active:scale-95"
                        >
                          <Plus className="w-3.5 h-3.5" />
                        </button>
                     </div>
                  </div>
                )}
                
              </div>
            )}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
